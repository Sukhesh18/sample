<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    text-align:center;
}

h1{
    margin-bottom:15px;
    color:#333;
}

#status{
    font-size:20px;
    margin-bottom:15px;
    font-weight:bold;
    color:#444;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:8px;
    justify-content:center;
}

.cell{
    width:100px;
    height:100px;
    background:#f4f4f4;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    cursor:pointer;
    transition:.3s;
    user-select:none;
}

.cell:hover{
    background:#dff9fb;
}

button{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:#2196f3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Tic Tac Toe</h1>

<div id="status">
Player X Turn
</div>

<div class="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<button onclick="restartGame()">Restart Game</button>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const statusText=document.getElementById("status");

let board=["","","","","","","","",""];
let currentPlayer="X";
let gameRunning=true;

const winPatterns=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach(cell=>{
cell.addEventListener("click",cellClicked);
});

function cellClicked(){

const index=this.dataset.index;

if(board[index]!="" || !gameRunning)
return;

board[index]=currentPlayer;
this.textContent=currentPlayer;

checkWinner();
}

function checkWinner(){

let won=false;

for(let pattern of winPatterns){

const a=board[pattern[0]];
const b=board[pattern[1]];
const c=board[pattern[2]];

if(a=="" || b=="" || c=="")
continue;

if(a===b && b===c){
won=true;
break;
}
}

if(won){
statusText.innerHTML="🏆 Player "+currentPlayer+" Wins!";
gameRunning=false;
return;
}

if(!board.includes("")){
statusText.innerHTML="🤝 Match Draw!";
gameRunning=false;
return;
}

currentPlayer=currentPlayer==="X"?"O":"X";

statusText.innerHTML="Player "+currentPlayer+" Turn";
}

function restartGame(){

board=["","","","","","","","",""];
gameRunning=true;
currentPlayer="X";

statusText.innerHTML="Player X Turn";

cells.forEach(cell=>{
cell.textContent="";
});

}

</script>

</body>
</html>
